<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KYUKAO | Portfolio Entry</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;700&display=swap');

    :root {
      --ink: #1d110c;
      --paper: #fff4dc;
      --gold: #f8cf84;
      --glow: rgba(255, 183, 96, 0.56);
      --shadow: rgba(18, 7, 4, 0.72);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #050302;
      color: var(--paper);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    button,
    a {
      font: inherit;
    }

    .entry-stage {
      position: fixed;
      inset: 0;
      isolation: isolate;
      background: #050302;
    }

    .video-layer,
    .opening-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .opening-video {
      object-fit: cover;
      opacity: 0;
      transition: opacity 240ms ease;
      background: #050302;
    }

    .opening-video.is-active {
      opacity: 1;
    }

    .grade {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 202, 133, 0.1), transparent 30%),
        linear-gradient(90deg, rgba(5, 2, 1, 0.2), transparent 20%, transparent 80%, rgba(5, 2, 1, 0.24)),
        linear-gradient(180deg, rgba(5, 2, 1, 0.32), transparent 26%, rgba(5, 2, 1, 0.42));
      mix-blend-mode: multiply;
    }

    .brand {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 5;
      transform: translate(-50%, -50%);
      width: min(86vw, 900px);
      text-align: center;
      pointer-events: none;
      transition: opacity 700ms ease, transform 700ms ease, filter 700ms ease;
    }

    .brand.is-hidden {
      opacity: 0;
      transform: translate(-50%, calc(-50% - 16px));
      filter: blur(8px);
    }

    .brand__name {
      margin: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(3rem, 8vw, 8rem);
      font-weight: 700;
      letter-spacing: 0;
      line-height: 0.86;
      color: #fff4df;
      text-shadow: 0 6px 32px rgba(0, 0, 0, 0.5), 0 0 22px rgba(255, 194, 120, 0.26);
    }

    .brand__role {
      margin: 18px 0 0;
      font-size: clamp(0.72rem, 1.4vw, 0.95rem);
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 234, 197, 0.82);
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
    }

    .start-layer {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: grid;
      place-items: end center;
      padding: 0 24px clamp(38px, 7vh, 86px);
      border: 0;
      color: inherit;
      background: transparent;
      cursor: pointer;
      transition: opacity 500ms ease, visibility 500ms ease, background 500ms ease;
    }

    .start-layer.is-waiting {
      background: rgba(0, 0, 0, 0.01);
    }

    .start-layer.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .start-prompt {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 168px;
      min-height: 44px;
      padding: 10px 24px;
      border: 1px solid rgba(255, 221, 167, 0.55);
      border-radius: 999px;
      color: rgba(255, 237, 206, 0.88);
      background: rgba(18, 8, 4, 0.36);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 38px rgba(0, 0, 0, 0.34), inset 0 0 18px rgba(255, 207, 132, 0.08);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .entry-ui {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .entry-ui.is-ready {
      pointer-events: auto;
    }

    .entry-item {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      aspect-ratio: var(--ratio);
      display: block;
      color: var(--paper);
      text-decoration: none;
      opacity: 0;
      transform: translate(-50%, -50%) translateY(18px) scale(0.96);
      filter: blur(6px);
      transition:
        opacity 1050ms ease,
        transform 1050ms cubic-bezier(0.16, 1, 0.3, 1),
        filter 1050ms ease;
      transition-delay: var(--delay);
      pointer-events: none;
    }

    .entry-ui.is-visible .entry-item {
      opacity: 1;
      transform: translate(-50%, -50%) translateY(0) scale(1);
      filter: blur(0);
      pointer-events: auto;
    }

    .entry-item__art {
      position: absolute;
      inset: 0;
      transition: transform 420ms ease, filter 420ms ease;
      filter: drop-shadow(0 18px 24px rgba(25, 6, 2, 0.34));
    }

    .entry-item__preview {
      position: absolute;
      left: 14.5%;
      right: 14.5%;
      top: 17%;
      bottom: 11%;
      border-radius: 48% 48% 6px 6px / 28% 28% 6px 6px;
      overflow: hidden;
      background: rgba(15, 8, 5, 0.7);
      box-shadow: inset 0 0 34px rgba(0, 0, 0, 0.44);
    }

    .entry-item__preview img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transform: scale(1.03);
      transition: transform 600ms ease, filter 600ms ease;
      filter: saturate(0.9) contrast(0.95) brightness(0.84);
    }

    .entry-item__frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .entry-item::after {
      content: "";
      position: absolute;
      inset: 7% 9%;
      border-radius: 48% 48% 8px 8px / 28% 28% 8px 8px;
      opacity: 0;
      background: radial-gradient(circle at 50% 38%, rgba(255, 206, 119, 0.3), transparent 58%);
      box-shadow: 0 0 32px rgba(255, 184, 92, 0.32), inset 0 0 24px rgba(255, 204, 124, 0.2);
      transition: opacity 420ms ease;
      pointer-events: none;
    }

    .entry-item__label {
      position: absolute;
      left: 50%;
      bottom: calc(100% + clamp(8px, 1.4vw, 18px));
      transform: translateX(-50%);
      min-width: max-content;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.65rem, 2.7vw, 3.1rem);
      font-weight: 700;
      line-height: 1;
      color: rgba(46, 23, 14, 0.94);
      text-shadow: 0 1px 0 rgba(255, 232, 185, 0.42), 0 9px 26px rgba(255, 172, 88, 0.18);
      transition: color 360ms ease, transform 360ms ease, text-shadow 360ms ease;
    }

    .entry-item:hover .entry-item__art,
    .entry-item:focus-visible .entry-item__art {
      transform: scale(1.035);
      filter: drop-shadow(0 22px 30px rgba(25, 6, 2, 0.42)) drop-shadow(0 0 16px rgba(255, 191, 104, 0.24));
    }

    .entry-item:hover .entry-item__preview img,
    .entry-item:focus-visible .entry-item__preview img {
      transform: scale(1.12);
      filter: saturate(1.06) contrast(1.02) brightness(0.98);
    }

    .entry-item:hover::after,
    .entry-item:focus-visible::after {
      opacity: 1;
    }

    .entry-item:hover .entry-item__label,
    .entry-item:focus-visible .entry-item__label {
      color: rgba(25, 10, 4, 0.98);
      transform: translateX(-50%) translateY(-3px);
      text-shadow: 0 1px 0 rgba(255, 238, 200, 0.52), 0 0 22px rgba(255, 190, 104, 0.36);
    }

    .entry-ui.is-exiting .entry-item {
      transition-delay: 0ms;
      opacity: 0;
      filter: blur(7px);
      pointer-events: none;
    }

    .entry-ui.is-exiting .entry-item.is-selected {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.18);
      filter: blur(0) brightness(1.08);
    }

    .transition-wash {
      position: absolute;
      inset: 0;
      z-index: 7;
      opacity: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at var(--wash-x, 50%) var(--wash-y, 50%), rgba(255, 214, 142, 0.72), transparent 18%),
        rgba(10, 4, 2, 0.76);
      transition: opacity 620ms ease;
    }

    .transition-wash.is-visible {
      opacity: 1;
    }

    .content-panel {
      position: fixed;
      inset: clamp(18px, 3vw, 34px);
      z-index: 12;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px) scale(0.985);
      border: 1px solid rgba(255, 221, 167, 0.45);
      background: rgba(10, 5, 3, 0.82);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.55), inset 0 0 28px rgba(255, 203, 128, 0.06);
      backdrop-filter: blur(14px);
      transition: opacity 360ms ease, visibility 360ms ease, transform 360ms ease;
    }

    .content-panel.is-visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    .content-panel__bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 54px;
      padding: 10px 16px 10px 22px;
      border-bottom: 1px solid rgba(255, 221, 167, 0.22);
      color: rgba(255, 237, 206, 0.86);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .content-panel__close {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255, 221, 167, 0.35);
      border-radius: 50%;
      color: rgba(255, 237, 206, 0.9);
      background: rgba(18, 8, 4, 0.42);
      cursor: pointer;
      line-height: 1;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .content-panel__close:hover {
      color: #1d110c;
      background: rgba(255, 221, 167, 0.86);
      transform: rotate(90deg);
    }

    .content-panel__frame {
      grid-row: 2;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
    }

    .contact-card {
      grid-row: 2;
      display: none;
      place-items: center;
      min-height: 100%;
      padding: 32px;
      text-align: center;
    }

    .contact-card.is-visible {
      display: grid;
    }

    .contact-card a {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2rem, 5vw, 4rem);
      color: #fff0d1;
      text-shadow: 0 0 28px rgba(255, 194, 120, 0.3);
    }

    .fallback {
      position: absolute;
      left: 50%;
      bottom: 28px;
      z-index: 9;
      transform: translateX(-50%);
      display: none;
      color: rgba(255, 236, 205, 0.76);
      font-size: 0.78rem;
      text-align: center;
    }

    .fallback.is-visible {
      display: block;
    }

    @media (max-width: 900px) {
      body {
        overflow-y: auto;
      }

      .entry-stage {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
      }

      .entry-ui {
        position: relative;
        z-index: 6;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 46px 16px;
        width: min(92vw, 620px);
        margin: 52vh auto 80px;
        padding: 0 10px;
      }

      .entry-item,
      .entry-ui.is-exiting .entry-item.is-selected {
        position: relative;
        left: auto;
        top: auto;
        width: 100%;
        transform: translateY(18px) scale(0.96);
      }

      .entry-ui.is-visible .entry-item {
        transform: translateY(0) scale(1);
      }

      .entry-item__label {
        font-size: clamp(1.55rem, 8vw, 2.2rem);
        color: rgba(255, 232, 196, 0.92);
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.46);
      }

      .brand {
        top: 38%;
      }

      .start-layer {
        place-items: center;
      }
    }

    @media (max-width: 520px) {
      .entry-ui {
        grid-template-columns: 1fr;
        width: min(74vw, 320px);
        gap: 54px;
      }

      .entry-item__label {
        bottom: calc(100% + 10px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .opening-video,
      .brand,
      .start-layer,
      .entry-item,
      .entry-item__art,
      .entry-item__preview img,
      .transition-wash {
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="entry-stage" aria-label="KYUKAO portfolio entrance">
    <div class="video-layer" aria-hidden="true">
      <video id="openingOne" class="opening-video is-active" src="assets/entry/video/opening-1-4k.mp4" preload="auto" autoplay playsinline muted></video>
      <video id="openingTwo" class="opening-video" src="assets/entry/video/opening-2-4k.mp4" preload="auto" playsinline muted></video>
    </div>

    <div class="grade" aria-hidden="true"></div>

    <section class="brand" id="brand">
      <h1 class="brand__name">KYUKAO</h1>
      <p class="brand__role">Technical Artist / Level Designer</p>
    </section>

    <nav class="entry-ui" id="entryUi" aria-label="Portfolio sections">
      <a class="entry-item" href="resume.html" style="--x: 11.8%; --y: 53.8%; --w: 10.2%; --ratio: 697 / 929; --delay: 0ms;" data-target="resume">
        <span class="entry-item__art">
          <span class="entry-item__preview"><img src="assets/entry/previews/preview-resume.webp" alt="" /></span>
          <img class="entry-item__frame" src="assets/entry/frames/resume-frame.png" alt="" />
        </span>
        <span class="entry-item__label">Resume</span>
      </a>

      <a class="entry-item" href="portfolio.html" style="--x: 28.0%; --y: 53.3%; --w: 10.2%; --ratio: 699 / 926; --delay: 130ms;" data-target="portfolio">
        <span class="entry-item__art">
          <span class="entry-item__preview"><img src="assets/entry/previews/preview-portfolio.webp" alt="" /></span>
          <img class="entry-item__frame" src="assets/entry/frames/portfolio-frame.png" alt="" />
        </span>
        <span class="entry-item__label">Portfolio</span>
      </a>

      <a class="entry-item" href="about.html" style="--x: 66.9%; --y: 53.3%; --w: 10.1%; --ratio: 693 / 927; --delay: 260ms;" data-target="about">
        <span class="entry-item__art">
          <span class="entry-item__preview"><img src="assets/entry/previews/preview-about.webp" alt="" /></span>
          <img class="entry-item__frame" src="assets/entry/frames/about-frame.png" alt="" />
        </span>
        <span class="entry-item__label">About</span>
      </a>

      <a class="entry-item" href="mailto:kyuandart@sina.com" style="--x: 85.0%; --y: 53.4%; --w: 10.2%; --ratio: 698 / 929; --delay: 390ms;" data-target="contact">
        <span class="entry-item__art">
          <span class="entry-item__preview"><img src="assets/entry/previews/preview-contact.webp" alt="" /></span>
          <img class="entry-item__frame" src="assets/entry/frames/contact-frame.png" alt="" />
        </span>
        <span class="entry-item__label">Contact</span>
      </a>
    </nav>

    <button class="start-layer" id="startLayer" type="button" aria-label="Enter KYUKAO portfolio">
      <span class="start-prompt">Click to Enter</span>
    </button>

    <div class="transition-wash" id="transitionWash" aria-hidden="true"></div>
    <p class="fallback" id="fallback">视频暂时无法播放，入口已开启。</p>

    <section class="content-panel" id="contentPanel" aria-hidden="true">
      <div class="content-panel__bar">
        <span id="contentPanelTitle">Portfolio</span>
        <button class="content-panel__close" id="contentPanelClose" type="button" aria-label="Close">×</button>
      </div>
      <iframe class="content-panel__frame" id="contentFrame" title="Section content"></iframe>
      <div class="contact-card" id="contactCard">
        <a href="mailto:kyuandart@sina.com">kyuandart@sina.com</a>
      </div>
    </section>
  </main>

  <script>
    const openingOne = document.getElementById('openingOne');
    const openingTwo = document.getElementById('openingTwo');
    const startLayer = document.getElementById('startLayer');
    const brand = document.getElementById('brand');
    const entryUi = document.getElementById('entryUi');
    const transitionWash = document.getElementById('transitionWash');
    const fallback = document.getElementById('fallback');
    const contentPanel = document.getElementById('contentPanel');
    const contentPanelTitle = document.getElementById('contentPanelTitle');
    const contentPanelClose = document.getElementById('contentPanelClose');
    const contentFrame = document.getElementById('contentFrame');
    const contactCard = document.getElementById('contactCard');
    let hasStarted = false;
    let hasRevealed = false;
    let queuedStart = false;
    let openingOneComplete = false;

    const revealEntries = () => {
      if (hasRevealed) return;
      hasRevealed = true;
      entryUi.classList.add('is-visible', 'is-ready');
    };

    const showFallback = () => {
      fallback.classList.add('is-visible');
      brand.classList.add('is-hidden');
      startLayer.classList.add('is-hidden');
      revealEntries();
    };

    const playVideo = async (video) => {
      try {
        await video.play();
      } catch (error) {
        showFallback();
      }
    };

    const startExperience = async () => {
      if (hasStarted) return;
      if (!openingOneComplete) {
        queuedStart = true;
        startLayer.classList.add('is-waiting');
        return;
      }
      hasStarted = true;
      startLayer.classList.add('is-hidden');
      brand.classList.add('is-hidden');
      openingTwo.load();
      openingTwo.currentTime = 0;
      openingTwo.classList.add('is-active');
      openingOne.classList.remove('is-active');
      await playVideo(openingTwo);
    };

    openingOne.addEventListener('ended', () => {
      openingOneComplete = true;
      openingOne.pause();
      openingOne.currentTime = Math.max(0, openingOne.duration - 0.04);
      startLayer.classList.add('is-waiting');
      if (queuedStart) startExperience();
    });

    openingTwo.addEventListener('ended', () => {
      openingTwo.pause();
      openingTwo.currentTime = Math.max(0, openingTwo.duration - 0.04);
      revealEntries();
    });

    openingOne.addEventListener('error', showFallback);
    openingTwo.addEventListener('error', showFallback);
    openingOne.addEventListener('loadedmetadata', () => {
      openingOne.playbackRate = 2;
    });
    startLayer.addEventListener('click', startExperience);
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') startExperience();
    });

    const openContentPanel = (title, href) => {
      contentPanelTitle.textContent = title;
      contactCard.classList.remove('is-visible');
      contentFrame.style.display = '';
      contentFrame.src = href;
      contentPanel.classList.add('is-visible');
      contentPanel.setAttribute('aria-hidden', 'false');
    };

    const openContactPanel = () => {
      contentPanelTitle.textContent = 'Contact';
      contentFrame.removeAttribute('src');
      contentFrame.style.display = 'none';
      contactCard.classList.add('is-visible');
      contentPanel.classList.add('is-visible');
      contentPanel.setAttribute('aria-hidden', 'false');
    };

    const closeContentPanel = () => {
      contentPanel.classList.remove('is-visible');
      contentPanel.setAttribute('aria-hidden', 'true');
      window.setTimeout(() => {
        if (!contentPanel.classList.contains('is-visible')) {
          contentFrame.removeAttribute('src');
          contentFrame.style.display = '';
          contactCard.classList.remove('is-visible');
        }
      }, 380);
    };

    contentPanelClose.addEventListener('click', closeContentPanel);
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeContentPanel();
    });

    document.querySelectorAll('.entry-item').forEach((item) => {
      item.addEventListener('click', (event) => {
        if (!entryUi.classList.contains('is-ready')) {
          event.preventDefault();
          return;
        }

        event.preventDefault();
        const href = item.getAttribute('href') || '';
        const label = item.querySelector('.entry-item__label')?.textContent?.trim() || 'Section';
        if (href.startsWith('mailto:')) {
          openContactPanel();
        } else {
          openContentPanel(label, href);
        }
      });
    });

    openingOne.load();
    openingTwo.load();
    openingOne.playbackRate = 2;
    playVideo(openingOne);
  </script>
</body>
</html>
