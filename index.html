<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KYUKAO | Portfolio Entry</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;700&display=swap');

    :root {
      --ink: #1d110c;
      --paper: #fff4dc;
      --gold: #f8cf84;
      --glow: rgba(255, 183, 96, 0.56);
      --shadow: rgba(18, 7, 4, 0.72);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #050302;
      color: var(--paper);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    button,
    a {
      font: inherit;
    }

    .entry-stage {
      position: fixed;
      inset: 0;
      isolation: isolate;
      background: #050302;
    }

    .video-layer,
    .opening-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .opening-video {
      object-fit: cover;
      opacity: 0;
      transition: opacity 240ms ease;
      background: #050302;
    }

    .opening-video.is-active {
      opacity: 1;
    }

    .grade {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 202, 133, 0.1), transparent 30%),
        linear-gradient(90deg, rgba(5, 2, 1, 0.2), transparent 20%, transparent 80%, rgba(5, 2, 1, 0.24)),
        linear-gradient(180deg, rgba(5, 2, 1, 0.32), transparent 26%, rgba(5, 2, 1, 0.42));
      mix-blend-mode: multiply;
    }

    .brand {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 5;
      transform: translate(-50%, -50%);
      width: min(86vw, 900px);
      text-align: center;
      pointer-events: none;
      transition: opacity 700ms ease, transform 700ms ease, filter 700ms ease;
    }

    .brand.is-hidden {
      opacity: 0;
      transform: translate(-50%, calc(-50% - 16px));
      filter: blur(8px);
    }

    .brand__name {
      margin: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(3rem, 8vw, 8rem);
      font-weight: 700;
      letter-spacing: 0;
      line-height: 0.86;
      color: #fff4df;
      text-shadow: 0 6px 32px rgba(0, 0, 0, 0.5), 0 0 22px rgba(255, 194, 120, 0.26);
    }

    .brand__role {
      width: min(92vw, 680px);
      margin: 18px auto 0;
      font-size: clamp(0.72rem, 1.4vw, 0.95rem);
      font-weight: 700;
      letter-spacing: 0.22em;
      line-height: 1.6;
      text-transform: uppercase;
      color: rgba(255, 234, 197, 0.82);
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
    }

    .start-layer {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: grid;
      place-items: end center;
      padding: 0 24px clamp(38px, 7vh, 86px);
      border: 0;
      color: inherit;
      background: transparent;
      cursor: pointer;
      transition: opacity 500ms ease, visibility 500ms ease, background 500ms ease;
    }

    .start-layer.is-waiting {
      background: rgba(0, 0, 0, 0.01);
    }

    .start-layer.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .start-prompt {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 168px;
      min-height: 44px;
      padding: 10px 24px;
      border: 1px solid rgba(255, 221, 167, 0.55);
      border-radius: 999px;
      color: rgba(255, 237, 206, 0.88);
      background: rgba(18, 8, 4, 0.36);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 38px rgba(0, 0, 0, 0.34), inset 0 0 18px rgba(255, 207, 132, 0.08);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .entry-ui {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .entry-ui.is-ready {
      pointer-events: auto;
    }

    .entry-item {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      aspect-ratio: var(--ratio);
      display: block;
      color: var(--paper);
      text-decoration: none;
      opacity: 0;
      transform: translate(-50%, -50%) translateY(18px) scale(0.96);
      filter: blur(6px);
      transition:
        opacity 1050ms ease,
        transform 1050ms cubic-bezier(0.16, 1, 0.3, 1),
        filter 1050ms ease;
      transition-delay: var(--delay);
      pointer-events: none;
    }

    .entry-ui.is-visible .entry-item {
      opacity: 1;
      transform: translate(-50%, -50%) translateY(0) scale(1);
      filter: blur(0);
      pointer-events: auto;
    }

    .entry-item__art {
      position: absolute;
      inset: 0;
      transition: transform 420ms ease, filter 420ms ease;
      filter: drop-shadow(0 18px 24px rgba(25, 6, 2, 0.34));
    }

    .entry-item__art::before,
    .entry-item__art::after {
      content: "";
      position: absolute;
      inset: -9%;
      z-index: 3;
      opacity: 0;
      pointer-events: none;
      border-radius: 48% 48% 10px 10px / 30% 30% 10px 10px;
      transition: opacity 260ms ease, transform 360ms ease;
    }

    .entry-item__art::before {
      border: 1px solid rgba(255, 219, 134, 0.7);
      box-shadow: 0 0 18px rgba(255, 190, 94, 0.42), inset 0 0 18px rgba(255, 218, 138, 0.18);
      transform: scale(0.96);
    }

    .entry-item__art::after {
      background:
        radial-gradient(circle at 28% 22%, rgba(255, 247, 198, 0.95) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 72% 18%, rgba(255, 207, 112, 0.85) 0 1.2px, transparent 2.5px),
        radial-gradient(circle at 86% 48%, rgba(255, 236, 171, 0.82) 0 1.4px, transparent 2.6px),
        radial-gradient(circle at 18% 62%, rgba(255, 205, 102, 0.72) 0 1.1px, transparent 2.4px);
      filter: drop-shadow(0 0 8px rgba(255, 202, 106, 0.8));
      transform: translateY(6px);
    }

    .entry-item__preview {
      position: absolute;
      left: 14.5%;
      right: 14.5%;
      top: 17%;
      bottom: 11%;
      border-radius: 48% 48% 6px 6px / 28% 28% 6px 6px;
      overflow: hidden;
      background: rgba(15, 8, 5, 0.7);
      box-shadow: inset 0 0 34px rgba(0, 0, 0, 0.44);
    }

    .entry-item__preview img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transform: scale(1.03);
      transition: transform 600ms ease, filter 600ms ease;
      filter: saturate(0.9) contrast(0.95) brightness(0.84);
    }

    .entry-item__frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .entry-item::after {
      content: "";
      position: absolute;
      inset: 7% 9%;
      border-radius: 48% 48% 8px 8px / 28% 28% 8px 8px;
      opacity: 0;
      background: radial-gradient(circle at 50% 38%, rgba(255, 206, 119, 0.3), transparent 58%);
      box-shadow: 0 0 32px rgba(255, 184, 92, 0.32), inset 0 0 24px rgba(255, 204, 124, 0.2);
      transition: opacity 420ms ease;
      pointer-events: none;
    }

    .entry-item__label {
      position: absolute;
      left: 50%;
      bottom: calc(100% + clamp(8px, 1.4vw, 18px));
      transform: translateX(-50%);
      min-width: max-content;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.65rem, 2.7vw, 3.1rem);
      font-weight: 700;
      line-height: 1;
      color: rgba(46, 23, 14, 0.94);
      text-shadow: 0 1px 0 rgba(255, 232, 185, 0.42), 0 9px 26px rgba(255, 172, 88, 0.18);
      transition: color 360ms ease, transform 360ms ease, text-shadow 360ms ease;
    }

    .entry-item:hover .entry-item__art,
    .entry-item:focus-visible .entry-item__art {
      transform: translateY(-10px) scale(1.06);
      filter:
        drop-shadow(0 24px 32px rgba(25, 6, 2, 0.44))
        drop-shadow(0 0 22px rgba(255, 191, 104, 0.62))
        drop-shadow(0 0 44px rgba(255, 214, 125, 0.28));
    }

    .entry-item:hover .entry-item__preview img,
    .entry-item:focus-visible .entry-item__preview img {
      transform: scale(1.12);
      filter: saturate(1.08) contrast(1.03) brightness(1.08);
    }

    .entry-item:hover::after,
    .entry-item:focus-visible::after {
      opacity: 1;
    }

    .entry-item:hover .entry-item__art::before,
    .entry-item:focus-visible .entry-item__art::before,
    .entry-item:hover .entry-item__art::after,
    .entry-item:focus-visible .entry-item__art::after {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .entry-item:hover .entry-item__preview,
    .entry-item:focus-visible .entry-item__preview {
      box-shadow:
        0 0 0 1px rgba(255, 229, 150, 0.6),
        0 0 22px rgba(255, 196, 96, 0.5),
        inset 0 0 34px rgba(255, 217, 142, 0.2);
    }

    .entry-item:hover .entry-item__label,
    .entry-item:focus-visible .entry-item__label {
      color: rgba(25, 10, 4, 0.98);
      transform: translateX(-50%) translateY(-3px);
      text-shadow: 0 1px 0 rgba(255, 238, 200, 0.52), 0 0 22px rgba(255, 190, 104, 0.36);
    }

    .entry-item:hover .entry-item__label::after,
    .entry-item:focus-visible .entry-item__label::after,
    .entry-item.is-selected .entry-item__label::after {
      content: "";
      position: absolute;
      left: 14%;
      right: 14%;
      bottom: -8px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 239, 190, 0.95), transparent);
      box-shadow: 0 0 10px rgba(255, 204, 119, 0.5);
    }

    .entry-item:active .entry-item__art,
    .entry-item.is-pressing .entry-item__art {
      transform: translateY(2px) scale(0.985);
      filter: drop-shadow(0 12px 20px rgba(25, 6, 2, 0.38)) drop-shadow(0 0 30px rgba(255, 205, 112, 0.62));
    }

    .entry-item:active .entry-item__art::before,
    .entry-item.is-pressing .entry-item__art::before {
      opacity: 1;
      animation: entryRipple 520ms ease-out;
    }

    .entry-item.is-selected::before {
      content: "";
      position: absolute;
      left: var(--trail-left, 50%);
      top: var(--trail-top, 94%);
      z-index: -1;
      width: var(--trail-w, 24vw);
      height: var(--trail-h, 14vh);
      border-radius: 0 0 56% 56%;
      opacity: 0;
      transform-origin: 0 50%;
      transform: rotate(var(--trail-angle, 18deg)) scaleX(0);
      border-bottom: 4px solid rgba(255, 219, 126, 0.9);
      border-right: 2px solid rgba(255, 219, 126, 0.36);
      background:
        radial-gradient(circle at 8% 82%, rgba(255, 244, 190, 0.95) 0 2px, transparent 4px),
        radial-gradient(circle at 32% 92%, rgba(255, 203, 93, 0.85) 0 1.5px, transparent 3px),
        radial-gradient(circle at 58% 98%, rgba(255, 241, 175, 0.75) 0 1.5px, transparent 3px);
      box-shadow:
        0 0 18px rgba(255, 198, 95, 0.9),
        0 0 42px rgba(255, 157, 58, 0.45),
        inset 0 -10px 12px rgba(255, 187, 88, 0.18);
      animation: entryTrail 700ms ease-out 80ms forwards;
    }

    .entry-item.is-selected .entry-item__art::before,
    .entry-item.is-selected .entry-item__art::after {
      opacity: 1;
      transform: scale(1.04);
    }

    .entry-item.is-selected .entry-item__art {
      transform: translateY(-8px) scale(1.08);
      filter:
        drop-shadow(0 24px 34px rgba(25, 6, 2, 0.42))
        drop-shadow(0 0 28px rgba(255, 205, 112, 0.82))
        drop-shadow(0 0 64px rgba(255, 168, 72, 0.4));
    }

    .entry-item.is-selected .entry-item__preview {
      box-shadow:
        0 0 0 2px rgba(255, 236, 166, 0.86),
        0 0 28px rgba(255, 206, 105, 0.78),
        0 0 58px rgba(255, 168, 72, 0.36),
        inset 0 0 32px rgba(255, 228, 150, 0.25);
    }

    .entry-item.is-selected .entry-item__label {
      color: #fff8df;
      text-shadow: 0 2px 12px rgba(12, 4, 2, 0.65), 0 0 24px rgba(255, 213, 130, 0.68);
    }

    .entry-ui.is-exiting .entry-item {
      transition-delay: 0ms;
      opacity: 0.38;
      filter: brightness(0.68) saturate(0.78);
      pointer-events: none;
    }

    .entry-ui.is-exiting .entry-item.is-selected {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.08);
      filter: blur(0) brightness(1.08);
    }

    .entry-item[data-target="resume"] { --trail-angle: -1deg; --trail-w: 42vw; --trail-h: 16vh; --trail-left: 52%; --trail-top: 94%; }
    .entry-item[data-target="portfolio"] { --trail-angle: 9deg; --trail-w: 27vw; --trail-h: 16vh; --trail-left: 50%; --trail-top: 94%; }
    .entry-item[data-target="about"] { --trail-angle: 171deg; --trail-w: 27vw; --trail-h: 16vh; --trail-left: 48%; --trail-top: 94%; }
    .entry-item[data-target="contact"] { --trail-angle: 181deg; --trail-w: 42vw; --trail-h: 16vh; --trail-left: 48%; --trail-top: 94%; }

    @keyframes entryRipple {
      0% { transform: scale(0.92); opacity: 1; }
      100% { transform: scale(1.18); opacity: 0; }
    }

    @keyframes entryTrail {
      0% { opacity: 0; transform: rotate(var(--trail-angle, 18deg)) scaleX(0); }
      30% { opacity: 1; }
      100% { opacity: 1; transform: rotate(var(--trail-angle, 18deg)) scaleX(1); }
    }

    .entry-stage::after {
      content: "";
      position: absolute;
      left: 31%;
      right: 31%;
      top: 54%;
      bottom: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      clip-path: polygon(46% 0, 54% 0, 64% 100%, 36% 100%);
      background:
        radial-gradient(ellipse at 50% 4%, rgba(255, 242, 176, 0.82), transparent 38%),
        linear-gradient(180deg, rgba(255, 213, 111, 0.5), rgba(255, 161, 57, 0.18) 56%, transparent);
      filter: blur(7px) drop-shadow(0 0 26px rgba(255, 183, 74, 0.72));
      mix-blend-mode: screen;
      transition: opacity 520ms ease;
    }

    .entry-stage.is-routing::after {
      opacity: 1;
    }

    .entry-item {
      cursor: pointer;
    }

    .entry-item.is-pressing {
      cursor: grabbing;
    }

    .entry-item__art {
      z-index: 2;
    }

    .entry-item__art::before {
      inset: -9%;
      border: 0;
      background: radial-gradient(ellipse at 50% 54%, transparent 42%, rgba(255, 230, 142, 0.32) 50%, transparent 61%);
      box-shadow: none;
      mix-blend-mode: screen;
      transform: scale(0.96);
    }

    .entry-item__art::after {
      inset: -22%;
      background:
        radial-gradient(circle at 18% 84%, rgba(255, 247, 194, 1) 0 2px, transparent 4px),
        radial-gradient(circle at 26% 20%, rgba(255, 224, 138, 0.95) 0 1.5px, transparent 3px),
        radial-gradient(circle at 72% 14%, rgba(255, 247, 194, 0.9) 0 1.5px, transparent 3px),
        radial-gradient(circle at 88% 58%, rgba(255, 206, 91, 0.86) 0 1.4px, transparent 3px),
        radial-gradient(circle at 42% 96%, rgba(255, 236, 168, 0.78) 0 1.3px, transparent 3px);
      filter: drop-shadow(0 0 10px rgba(255, 220, 133, 0.95));
    }

    .entry-item:hover .entry-item__art,
    .entry-item:focus-visible .entry-item__art {
      transform: translateY(-10px) scale(1.065);
      filter:
        drop-shadow(0 24px 32px rgba(25, 6, 2, 0.44))
        drop-shadow(0 0 22px rgba(255, 225, 146, 0.7))
        drop-shadow(0 0 54px rgba(255, 158, 56, 0.38));
    }

    .entry-item:hover .entry-item__preview img,
    .entry-item:focus-visible .entry-item__preview img {
      filter: saturate(1.14) contrast(1.06) brightness(1.2);
    }

    .entry-item.is-pressing .entry-item__art,
    .entry-item:active .entry-item__art {
      transform: translateY(3px) scale(1.015);
    }

    .entry-item.is-selected {
      z-index: 6;
    }

    .entry-item.is-selected::before {
      z-index: 1;
      left: var(--trail-left, 50%);
      top: var(--trail-top, 94%);
      width: var(--trail-w, 28vw);
      height: 12px;
      border: 0;
      border-radius: 999px;
      background:
        radial-gradient(circle at 8% 50%, rgba(255, 248, 196, 1) 0 4px, transparent 7px),
        linear-gradient(90deg, rgba(255, 247, 184, 0.96), rgba(255, 199, 78, 0.78) 48%, transparent 100%);
      box-shadow:
        0 0 14px rgba(255, 244, 178, 0.95),
        0 0 34px rgba(255, 193, 80, 0.86),
        0 0 76px rgba(255, 139, 34, 0.52);
      filter: blur(0.2px);
      mix-blend-mode: screen;
      animation: entryTrail 820ms cubic-bezier(.16,.8,.24,1) 70ms forwards;
    }

    .entry-item.is-selected::after {
      opacity: 0;
    }

    .entry-item.is-selected .entry-item__art {
      transform: translateY(-12px) scale(1.11);
      filter:
        drop-shadow(0 28px 36px rgba(25, 6, 2, 0.46))
        drop-shadow(0 0 30px rgba(255, 239, 170, 0.96))
        drop-shadow(0 0 72px rgba(255, 166, 57, 0.56));
    }

    .entry-item.is-selected .entry-item__art::before,
    .entry-item.is-selected .entry-item__art::after {
      opacity: 1;
      transform: scale(1.06);
    }

    .entry-item.is-selected .entry-item__preview img {
      transform: scale(1.1);
      filter: saturate(1.2) contrast(1.08) brightness(1.3);
    }

    .entry-item:hover .entry-item__frame,
    .entry-item:focus-visible .entry-item__frame {
      filter:
        brightness(1.12)
        drop-shadow(0 0 7px rgba(255, 244, 184, 0.86))
        drop-shadow(0 0 20px rgba(255, 182, 72, 0.6));
    }

    .entry-item.is-selected .entry-item__frame {
      filter:
        brightness(1.26)
        contrast(1.06)
        drop-shadow(0 0 5px rgba(255, 255, 215, 1))
        drop-shadow(0 0 18px rgba(255, 220, 120, 0.96))
        drop-shadow(0 0 42px rgba(255, 147, 38, 0.72));
    }

    .entry-item.is-selected .entry-item__label {
      transform: translateX(-50%) translateY(-12px);
      color: #fff8df;
      text-shadow:
        0 2px 14px rgba(12, 4, 2, 0.78),
        0 0 18px rgba(255, 243, 184, 0.82),
        0 0 36px rgba(255, 183, 74, 0.58);
    }

    .entry-ui.is-exiting .entry-item:not(.is-selected) {
      opacity: 0.46;
      filter: brightness(0.56) saturate(0.72);
    }

    .entry-ui.is-exiting .entry-item.is-selected {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.05);
      filter: brightness(1.12);
    }

    .entry-flow {
      position: absolute;
      inset: 0;
      z-index: 5;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      mix-blend-mode: screen;
      transition: opacity 240ms ease;
    }

    .entry-stage.is-routing .entry-flow {
      opacity: 1;
    }

    .entry-flow path {
      opacity: 0;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 92;
      stroke-dashoffset: 92;
    }

    .entry-flow .flow-core {
      stroke: rgba(255, 246, 181, 0.96);
      stroke-width: 0.28;
      filter: drop-shadow(0 0 0.8px rgba(255, 250, 210, 1)) drop-shadow(0 0 2px rgba(255, 176, 62, 0.95));
    }

    .entry-flow .flow-glow {
      stroke: rgba(255, 173, 52, 0.5);
      stroke-width: 1.05;
      filter: blur(0.55px) drop-shadow(0 0 5px rgba(255, 161, 45, 0.86));
    }

    .entry-stage[data-route="resume"] .entry-flow [data-flow="resume"],
    .entry-stage[data-route="portfolio"] .entry-flow [data-flow="portfolio"],
    .entry-stage[data-route="about"] .entry-flow [data-flow="about"],
    .entry-stage[data-route="contact"] .entry-flow [data-flow="contact"] {
      opacity: 1;
      animation: drawFlow 980ms cubic-bezier(.18,.82,.2,1) 80ms forwards;
    }

    .entry-item.is-selected::before {
      display: none;
    }

    @keyframes drawFlow {
      0% { stroke-dashoffset: 92; }
      100% { stroke-dashoffset: 0; }
    }

    .transition-wash {
      position: absolute;
      inset: 0;
      z-index: 7;
      opacity: 0;
      pointer-events: none;
      background: rgba(7, 4, 3, 0.78);
      transition: opacity 620ms ease;
    }

    .transition-wash.is-visible {
      opacity: 1;
    }

    .entry-stage::after,
    .entry-item::after,
    .entry-item__art::before {
      display: none !important;
    }

    .fallback {
      position: absolute;
      left: 50%;
      bottom: 28px;
      z-index: 9;
      transform: translateX(-50%);
      display: none;
      color: rgba(255, 236, 205, 0.76);
      font-size: 0.78rem;
      text-align: center;
    }

    .fallback.is-visible {
      display: block;
    }

    @media (max-width: 900px) {
      body {
        overflow-y: auto;
      }

      .entry-stage {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
      }

      .entry-ui {
        position: relative;
        z-index: 6;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 46px 16px;
        width: min(92vw, 620px);
        margin: 52vh auto 80px;
        padding: 0 10px;
      }

      .entry-item,
      .entry-ui.is-exiting .entry-item.is-selected {
        position: relative;
        left: auto;
        top: auto;
        width: 100%;
        transform: translateY(18px) scale(0.96);
      }

      .entry-ui.is-visible .entry-item {
        transform: translateY(0) scale(1);
      }

      .entry-item__label {
        font-size: clamp(1.55rem, 8vw, 2.2rem);
        color: rgba(255, 232, 196, 0.92);
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.46);
      }

      .brand {
        top: 38%;
      }

    }

    @media (max-height: 600px) {
      .brand {
        top: 40%;
      }

      .start-layer {
        padding-bottom: 20px;
      }

      .start-prompt {
        min-height: 40px;
        padding: 8px 20px;
      }
    }

    @media (max-width: 520px) {
      .entry-ui {
        grid-template-columns: 1fr;
        width: min(74vw, 320px);
        gap: 54px;
      }

      .entry-item__label {
        bottom: calc(100% + 10px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .opening-video,
      .brand,
      .start-layer,
      .entry-item,
      .entry-item__art,
      .entry-item__preview img,
      .transition-wash {
        transition-duration: 1ms !important;
      }
    }
    .portfolio-embed {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #090504;
    }

    .entry-stage {
      z-index: 2;
      transition: opacity 760ms ease, visibility 760ms ease;
    }

    .entry-stage.is-complete {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <iframe class="portfolio-embed" src="portfolio.html" title="KYUKAO portfolio"></iframe>
  <main class="entry-stage" aria-label="KYUKAO portfolio entrance">
    <div class="video-layer" aria-hidden="true">
      <video id="openingOne" class="opening-video is-active" src="assets/entry/video/opening-1-ui.mp4" preload="auto" autoplay playsinline muted></video>
    </div>

    <div class="grade" aria-hidden="true"></div>

    <section class="brand" id="brand">
      <h1 class="brand__name">KYUKAO</h1>
      <p class="brand__role">Technical Artist</p>
    </section>


    <button class="start-layer" id="startLayer" type="button" aria-label="Enter KYUKAO portfolio">
      <span class="start-prompt">Click to Enter</span>
    </button>

    <div class="transition-wash" id="transitionWash" aria-hidden="true"></div>
    <p class="fallback" id="fallback">Video unavailable. Opening portfolio...</p>

  </main>

  <script>
    const openingOne = document.getElementById('openingOne');
    const startLayer = document.getElementById('startLayer');
    const brand = document.getElementById('brand');
    const transitionWash = document.getElementById('transitionWash');
    const fallback = document.getElementById('fallback');
    let hasStarted = false;
    let queuedStart = false;
    let openingOneComplete = false;

    const goToPortfolio = () => {
      if (hasStarted) return;
      hasStarted = true;
      startLayer.classList.add('is-hidden');
      brand.classList.add('is-hidden');
      transitionWash.style.setProperty('--wash-x', '50vw');
      transitionWash.style.setProperty('--wash-y', '50vh');
      window.setTimeout(() => {
        transitionWash.classList.add('is-visible');
      }, 80);
      window.setTimeout(() => {
        document.querySelector('.entry-stage').classList.add('is-complete');
        document.documentElement.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';
      }, 420);
    };

    const showFallback = () => {
      fallback.classList.add('is-visible');
      brand.classList.add('is-hidden');
      startLayer.classList.add('is-hidden');
      window.setTimeout(goToPortfolio, 500);
    };

    const playVideo = async (video) => {
      try {
        await video.play();
      } catch (error) {
        showFallback();
      }
    };

    const startExperience = async () => {
      if (hasStarted) return;
      if (!openingOneComplete) {
        queuedStart = true;
        startLayer.classList.add('is-waiting');
        return;
      }
      goToPortfolio();
    };

    openingOne.addEventListener('ended', () => {
      openingOneComplete = true;
      openingOne.pause();
      openingOne.currentTime = Math.max(0, openingOne.duration - 0.04);
      startLayer.classList.add('is-waiting');
      if (queuedStart) {
        startExperience();
        return;
      }
      goToPortfolio();
    });

    openingOne.addEventListener('error', showFallback);
    openingOne.addEventListener('loadedmetadata', () => {
      openingOne.playbackRate = 3;
    });
    startLayer.addEventListener('click', startExperience);
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') startExperience();
    });

    openingOne.load();
    openingOne.playbackRate = 3;
    playVideo(openingOne);
  </script>
</body>
</html>
