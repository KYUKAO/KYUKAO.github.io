<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Hanqing Li - KYUKAO</title>
  <link rel="stylesheet" href="assets/entry/scene-pages.css?v=20260527" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    .contact-page {
      width: min(1120px, calc(100vw - 64px));
      margin: 0 auto;
      padding: 124px 0 80px;
    }
    .contact-hero {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
      gap: clamp(30px, 5vw, 72px);
      align-items: center;
      min-height: calc(100vh - 204px);
    }
    .contact-title {
      margin: 0;
      font-family: var(--scene-display);
      font-size: clamp(4rem, 9vw, 8rem);
      line-height: 0.9;
      color: var(--scene-paper);
      text-shadow: 0 0 30px rgba(232, 187, 111, 0.26);
    }
    .contact-role {
      margin: 20px 0 0;
      color: var(--scene-muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .contact-list {
      display: grid;
      gap: 18px;
    }
    .contact-link {
      position: relative;
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 18px;
      align-items: center;
      min-height: 86px;
      padding: 20px 24px;
      border: 1px solid var(--scene-gold-soft);
      background: var(--scene-panel);
      box-shadow: 0 24px 42px rgba(24, 7, 3, 0.4), inset 0 0 0 1px rgba(255, 239, 197, 0.08);
      backdrop-filter: blur(8px);
      transition: transform 220ms ease, border-color 220ms ease, box-shadow 220ms ease;
    }
    .contact-link:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 224, 160, 0.82);
      box-shadow: 0 28px 54px rgba(24, 7, 3, 0.54), 0 0 28px rgba(232, 187, 111, 0.16);
    }
    .contact-label {
      color: var(--scene-gold);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .contact-value {
      min-width: 0;
      color: var(--scene-paper);
      font-family: var(--scene-display);
      font-size: clamp(1.35rem, 2.4vw, 2.1rem);
      line-height: 1.05;
      overflow-wrap: anywhere;
    }
    @media (max-width: 820px) {
      .contact-page { width: min(92vw, 620px); padding-top: 94px; }
      .contact-hero { grid-template-columns: 1fr; min-height: auto; }
      .contact-link { grid-template-columns: 1fr; gap: 8px; }
    }
  </style>
</head>
<body class="scene-page contact-scene">
  <nav>
    <a href="portfolio.html" class="nav-logo">KYUKAO</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="portfolio.html" data-i18n="nav.portfolio">Portfolio</a></li>
      <li><a href="resume.html" data-i18n="nav.resume">Resume</a></li>
      <li><a href="about.html" data-i18n="nav.about">About</a></li>
      <li><a href="contact.html" class="active" data-i18n="nav.contact">Contact</a></li>
    </ul>
    <div class="nav-toggle" id="navToggle"><span></span><span></span><span></span></div>
  </nav>

  <main class="contact-page">
    <section class="contact-hero">
      <header>
        <h1 class="contact-title" data-i18n="contact.page.title">Contact</h1>
        <p class="contact-role" data-i18n="contact.page.role">Technical Artist / Game Creator</p>
      </header>
      <div class="contact-list">
        <a class="contact-link" data-contact-page-key="email" href="mailto:kyuandart@sina.com">
          <span class="contact-label" data-i18n="contact.email.label">Email</span>
          <span class="contact-value">kyuandart@sina.com</span>
        </a>
        <a class="contact-link" data-contact-page-key="linkedin" href="https://www.linkedin.com/in/hanqing-li-000069223" target="_blank" rel="noreferrer">
          <span class="contact-label" data-i18n="contact.linkedin.label">LinkedIn</span>
          <span class="contact-value">Hanqing Li</span>
        </a>
        <a class="contact-link" data-contact-page-key="website" href="https://kyukao.github.io/index.html" target="_blank" rel="noreferrer">
          <span class="contact-label" data-i18n="contact.website.label">Website</span>
          <span class="contact-value">kyukao.github.io</span>
        </a>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="js/typography.js"></script>
  <script src="js/content.js"></script>
  <script src="js/i18n.js"></script>
  <script src="assets/entry/scene-background.js?v=20260527"></script>
  <script>
    document.getElementById('navToggle').addEventListener('click', function () {
      document.getElementById('navLinks').classList.toggle('open');
    });
  </script>
</body>
</html>
