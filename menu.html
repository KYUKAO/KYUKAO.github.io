<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KYUKAO | Home</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;700&display=swap');

    :root {
      --paper: #fff4dc;
      --gold: #f8cf84;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #050302;
      color: var(--paper);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    a { color: inherit; font: inherit; text-decoration: none; }

    .entry-stage {
      position: fixed;
      inset: 0;
      isolation: isolate;
      overflow: hidden;
      background: #050302;
    }

    .static-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-image: url("assets/entry/small-garden-4k.jpg");
      background-size: cover;
      background-position: center center;
      filter: saturate(1.02) brightness(0.86);
      transform: scale(1.01);
    }

    .grade {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 202, 133, 0.08), transparent 30%),
        linear-gradient(90deg, rgba(5, 2, 1, 0.22), transparent 20%, transparent 80%, rgba(5, 2, 1, 0.28)),
        linear-gradient(180deg, rgba(5, 2, 1, 0.22), transparent 30%, rgba(5, 2, 1, 0.36));
    }

    .home-mark {
      position: absolute;
      top: 28px;
      left: 34px;
      z-index: 8;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: rgba(255, 244, 223, 0.88);
      text-shadow: 0 0 20px rgba(255, 194, 120, 0.28);
    }

    .entry-ui {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: auto;
    }

    .entry-item {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      aspect-ratio: var(--ratio);
      display: block;
      color: var(--paper);
      opacity: 1;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 18px 24px rgba(25, 6, 2, 0.34));
      transition: transform 420ms ease, filter 420ms ease, opacity 420ms ease;
    }

    .entry-item__art {
      position: absolute;
      inset: 0;
      transition: transform 420ms ease, filter 420ms ease;
    }

    .entry-item__art::before,
    .entry-item__art::after {
      content: "";
      position: absolute;
      inset: -9%;
      z-index: 3;
      opacity: 0;
      pointer-events: none;
      border-radius: 48% 48% 10px 10px / 30% 30% 10px 10px;
      transition: opacity 260ms ease, transform 360ms ease;
    }

    .entry-item__art::before {
      border: 1px solid rgba(255, 219, 134, 0.7);
      box-shadow: 0 0 18px rgba(255, 190, 94, 0.42), inset 0 0 18px rgba(255, 218, 138, 0.18);
      transform: scale(0.96);
    }

    .entry-item__art::after {
      background:
        radial-gradient(circle at 28% 22%, rgba(255, 247, 198, 0.95) 0 1.5px, transparent 2.5px),
        radial-gradient(circle at 72% 18%, rgba(255, 207, 112, 0.85) 0 1.2px, transparent 2.5px),
        radial-gradient(circle at 86% 48%, rgba(255, 236, 171, 0.82) 0 1.4px, transparent 2.6px),
        radial-gradient(circle at 18% 62%, rgba(255, 205, 102, 0.72) 0 1.1px, transparent 2.4px);
      filter: drop-shadow(0 0 8px rgba(255, 202, 106, 0.8));
      transform: translateY(6px);
    }

    .entry-item__preview {
      position: absolute;
      left: 14.5%;
      right: 14.5%;
      top: 17%;
      bottom: 11%;
      border-radius: 48% 48% 6px 6px / 28% 28% 6px 6px;
      overflow: hidden;
      background: rgba(15, 8, 5, 0.7);
      box-shadow: inset 0 0 34px rgba(0, 0, 0, 0.44);
    }

    .entry-item__preview img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transform: scale(1.03);
      transition: transform 600ms ease, filter 600ms ease;
      filter: saturate(0.9) contrast(0.95) brightness(0.84);
    }

    .entry-item__frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .entry-item::after {
      content: "";
      position: absolute;
      inset: 7% 9%;
      border-radius: 48% 48% 8px 8px / 28% 28% 8px 8px;
      opacity: 0;
      background: radial-gradient(circle at 50% 38%, rgba(255, 206, 119, 0.3), transparent 58%);
      box-shadow: 0 0 32px rgba(255, 184, 92, 0.32), inset 0 0 24px rgba(255, 204, 124, 0.2);
      transition: opacity 420ms ease;
      pointer-events: none;
    }

    .entry-item__label {
      position: absolute;
      left: 50%;
      bottom: calc(100% + clamp(8px, 1.4vw, 18px));
      transform: translateX(-50%);
      min-width: max-content;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.65rem, 2.7vw, 3.1rem);
      font-weight: 700;
      line-height: 1;
      color: rgba(46, 23, 14, 0.94);
      text-shadow: 0 1px 0 rgba(255, 232, 185, 0.42), 0 9px 26px rgba(255, 172, 88, 0.18);
      transition: color 360ms ease, transform 360ms ease, text-shadow 360ms ease;
    }

    .entry-item:hover .entry-item__art,
    .entry-item:focus-visible .entry-item__art {
      transform: translateY(-8px) scale(1.045);
      filter: drop-shadow(0 24px 32px rgba(25, 6, 2, 0.44)) drop-shadow(0 0 20px rgba(255, 191, 104, 0.36));
    }

    .entry-item:hover .entry-item__preview img,
    .entry-item:focus-visible .entry-item__preview img {
      transform: scale(1.12);
      filter: saturate(1.08) contrast(1.03) brightness(1.08);
    }

    .entry-item:hover::after,
    .entry-item:focus-visible::after {
      opacity: 1;
    }

    .entry-item:hover .entry-item__art::before,
    .entry-item:focus-visible .entry-item__art::before,
    .entry-item:hover .entry-item__art::after,
    .entry-item:focus-visible .entry-item__art::after {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .entry-item:hover .entry-item__label,
    .entry-item:focus-visible .entry-item__label {
      color: rgba(25, 10, 4, 0.98);
      transform: translateX(-50%) translateY(-3px);
      text-shadow: 0 1px 0 rgba(255, 238, 200, 0.52), 0 0 22px rgba(255, 190, 104, 0.36);
    }

    .entry-item:hover .entry-item__label::after,
    .entry-item:focus-visible .entry-item__label::after,
    .entry-item.is-selected .entry-item__label::after {
      content: "";
      position: absolute;
      left: 14%;
      right: 14%;
      bottom: -8px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 239, 190, 0.95), transparent);
      box-shadow: 0 0 10px rgba(255, 204, 119, 0.5);
    }

    .entry-item:active .entry-item__art,
    .entry-item.is-pressing .entry-item__art {
      transform: translateY(2px) scale(0.985);
      filter: drop-shadow(0 12px 20px rgba(25, 6, 2, 0.38)) drop-shadow(0 0 30px rgba(255, 205, 112, 0.62));
    }

    .entry-item:active .entry-item__art::before,
    .entry-item.is-pressing .entry-item__art::before {
      opacity: 1;
      animation: entryRipple 520ms ease-out;
    }

    .entry-item.is-selected::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 92%;
      z-index: -1;
      width: var(--trail-len, 24vw);
      height: 5px;
      border-radius: 999px;
      opacity: 0;
      transform-origin: 0 50%;
      transform: rotate(var(--trail-angle, 18deg)) scaleX(0);
      background: linear-gradient(90deg, rgba(255, 232, 158, 0.95), rgba(255, 178, 72, 0.7), transparent);
      box-shadow: 0 0 18px rgba(255, 198, 95, 0.8), 0 0 38px rgba(255, 157, 58, 0.36);
      animation: entryTrail 700ms ease-out 80ms forwards;
    }

    .entry-item.is-selected .entry-item__art::before,
    .entry-item.is-selected .entry-item__art::after {
      opacity: 1;
      transform: scale(1.04);
    }

    .entry-item.is-selected .entry-item__label {
      color: #fff8df;
      text-shadow: 0 2px 12px rgba(12, 4, 2, 0.65), 0 0 24px rgba(255, 213, 130, 0.68);
    }

    .entry-ui.is-exiting .entry-item {
      opacity: 0.38;
      filter: brightness(0.68) saturate(0.78);
      pointer-events: none;
    }

    .entry-ui.is-exiting .entry-item.is-selected {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.08);
      filter: blur(0) brightness(1.08);
    }

    .entry-item[data-target="resume"] { --trail-angle: -8deg; --trail-len: 40vw; }
    .entry-item[data-target="portfolio"] { --trail-angle: 12deg; --trail-len: 25vw; }
    .entry-item[data-target="about"] { --trail-angle: 166deg; --trail-len: 25vw; }
    .entry-item[data-target="contact"] { --trail-angle: 184deg; --trail-len: 38vw; }

    @keyframes entryRipple {
      0% { transform: scale(0.92); opacity: 1; }
      100% { transform: scale(1.18); opacity: 0; }
    }

    @keyframes entryTrail {
      0% { opacity: 0; transform: rotate(var(--trail-angle, 18deg)) scaleX(0); }
      30% { opacity: 1; }
      100% { opacity: 1; transform: rotate(var(--trail-angle, 18deg)) scaleX(1); }
    }

    .entry-stage::after {
      content: "";
      position: absolute;
      left: 31%;
      right: 31%;
      top: 54%;
      bottom: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      clip-path: polygon(46% 0, 54% 0, 64% 100%, 36% 100%);
      background:
        radial-gradient(ellipse at 50% 4%, rgba(255, 242, 176, 0.82), transparent 38%),
        linear-gradient(180deg, rgba(255, 213, 111, 0.5), rgba(255, 161, 57, 0.18) 56%, transparent);
      filter: blur(7px) drop-shadow(0 0 26px rgba(255, 183, 74, 0.72));
      mix-blend-mode: screen;
      transition: opacity 520ms ease;
    }

    .entry-stage.is-routing::after {
      opacity: 1;
    }

    .entry-item {
      cursor: pointer;
    }

    .entry-item.is-pressing {
      cursor: grabbing;
    }

    .entry-item__art {
      z-index: 2;
    }

    .entry-item__art::before {
      inset: -9%;
      border: 0;
      background: radial-gradient(ellipse at 50% 54%, transparent 42%, rgba(255, 230, 142, 0.32) 50%, transparent 61%);
      box-shadow: none;
      mix-blend-mode: screen;
      transform: scale(0.96);
    }

    .entry-item__art::after {
      inset: -22%;
      background:
        radial-gradient(circle at 18% 84%, rgba(255, 247, 194, 1) 0 2px, transparent 4px),
        radial-gradient(circle at 26% 20%, rgba(255, 224, 138, 0.95) 0 1.5px, transparent 3px),
        radial-gradient(circle at 72% 14%, rgba(255, 247, 194, 0.9) 0 1.5px, transparent 3px),
        radial-gradient(circle at 88% 58%, rgba(255, 206, 91, 0.86) 0 1.4px, transparent 3px),
        radial-gradient(circle at 42% 96%, rgba(255, 236, 168, 0.78) 0 1.3px, transparent 3px);
      filter: drop-shadow(0 0 10px rgba(255, 220, 133, 0.95));
    }

    .entry-item:hover .entry-item__art,
    .entry-item:focus-visible .entry-item__art {
      transform: translateY(-10px) scale(1.065);
      filter:
        drop-shadow(0 24px 32px rgba(25, 6, 2, 0.44))
        drop-shadow(0 0 22px rgba(255, 225, 146, 0.7))
        drop-shadow(0 0 54px rgba(255, 158, 56, 0.38));
    }

    .entry-item:hover .entry-item__preview img,
    .entry-item:focus-visible .entry-item__preview img {
      filter: saturate(1.14) contrast(1.06) brightness(1.2);
    }

    .entry-item.is-pressing .entry-item__art,
    .entry-item:active .entry-item__art {
      transform: translateY(3px) scale(1.015);
    }

    .entry-item.is-selected {
      z-index: 6;
    }

    .entry-item.is-selected::before {
      z-index: 1;
      left: var(--trail-left, 50%);
      top: var(--trail-top, 94%);
      width: var(--trail-w, 28vw);
      height: 12px;
      border: 0;
      border-radius: 999px;
      background:
        radial-gradient(circle at 8% 50%, rgba(255, 248, 196, 1) 0 4px, transparent 7px),
        linear-gradient(90deg, rgba(255, 247, 184, 0.96), rgba(255, 199, 78, 0.78) 48%, transparent 100%);
      box-shadow:
        0 0 14px rgba(255, 244, 178, 0.95),
        0 0 34px rgba(255, 193, 80, 0.86),
        0 0 76px rgba(255, 139, 34, 0.52);
      filter: blur(0.2px);
      mix-blend-mode: screen;
      animation: entryTrail 820ms cubic-bezier(.16,.8,.24,1) 70ms forwards;
    }

    .entry-item.is-selected::after {
      opacity: 0;
    }

    .entry-item.is-selected .entry-item__art {
      transform: translateY(-12px) scale(1.11);
      filter:
        drop-shadow(0 28px 36px rgba(25, 6, 2, 0.46))
        drop-shadow(0 0 30px rgba(255, 239, 170, 0.96))
        drop-shadow(0 0 72px rgba(255, 166, 57, 0.56));
    }

    .entry-item.is-selected .entry-item__art::before,
    .entry-item.is-selected .entry-item__art::after {
      opacity: 1;
      transform: scale(1.06);
    }

    .entry-item.is-selected .entry-item__preview img {
      transform: scale(1.1);
      filter: saturate(1.2) contrast(1.08) brightness(1.3);
    }

    .entry-item:hover .entry-item__frame,
    .entry-item:focus-visible .entry-item__frame {
      filter:
        brightness(1.12)
        drop-shadow(0 0 7px rgba(255, 244, 184, 0.86))
        drop-shadow(0 0 20px rgba(255, 182, 72, 0.6));
    }

    .entry-item.is-selected .entry-item__frame {
      filter:
        brightness(1.26)
        contrast(1.06)
        drop-shadow(0 0 5px rgba(255, 255, 215, 1))
        drop-shadow(0 0 18px rgba(255, 220, 120, 0.96))
        drop-shadow(0 0 42px rgba(255, 147, 38, 0.72));
    }

    .entry-item.is-selected .entry-item__label {
      transform: translateX(-50%) translateY(-12px);
      color: #fff8df;
      text-shadow:
        0 2px 14px rgba(12, 4, 2, 0.78),
        0 0 18px rgba(255, 243, 184, 0.82),
        0 0 36px rgba(255, 183, 74, 0.58);
    }

    .entry-ui.is-exiting .entry-item:not(.is-selected) {
      opacity: 0.46;
      filter: brightness(0.56) saturate(0.72);
    }

    .entry-ui.is-exiting .entry-item.is-selected {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.05);
      filter: brightness(1.12);
    }

    .entry-flow {
      position: absolute;
      inset: 0;
      z-index: 5;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      mix-blend-mode: screen;
      transition: opacity 240ms ease;
    }

    .entry-stage.is-routing .entry-flow {
      opacity: 1;
    }

    .entry-flow path {
      opacity: 0;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 92;
      stroke-dashoffset: 92;
    }

    .entry-flow .flow-core {
      stroke: rgba(255, 246, 181, 0.96);
      stroke-width: 0.28;
      filter: drop-shadow(0 0 0.8px rgba(255, 250, 210, 1)) drop-shadow(0 0 2px rgba(255, 176, 62, 0.95));
    }

    .entry-flow .flow-glow {
      stroke: rgba(255, 173, 52, 0.5);
      stroke-width: 1.05;
      filter: blur(0.55px) drop-shadow(0 0 5px rgba(255, 161, 45, 0.86));
    }

    .entry-stage[data-route="resume"] .entry-flow [data-flow="resume"],
    .entry-stage[data-route="portfolio"] .entry-flow [data-flow="portfolio"],
    .entry-stage[data-route="about"] .entry-flow [data-flow="about"],
    .entry-stage[data-route="contact"] .entry-flow [data-flow="contact"] {
      opacity: 1;
      animation: drawFlow 980ms cubic-bezier(.18,.82,.2,1) 80ms forwards;
    }

    .entry-item.is-selected::before {
      display: none;
    }

    @keyframes drawFlow {
      0% { stroke-dashoffset: 92; }
      100% { stroke-dashoffset: 0; }
    }

    .entry-item[data-target="resume"] { --trail-angle: -3deg; --trail-w: 42vw; --trail-h: 20vh; --trail-left: 50%; --trail-top: 93%; }
    .entry-item[data-target="portfolio"] { --trail-angle: 10deg; --trail-w: 28vw; --trail-h: 19vh; --trail-left: 50%; --trail-top: 93%; }
    .entry-item[data-target="about"] { --trail-angle: 170deg; --trail-w: 28vw; --trail-h: 19vh; --trail-left: 48%; --trail-top: 93%; }
    .entry-item[data-target="contact"] { --trail-angle: 183deg; --trail-w: 42vw; --trail-h: 20vh; --trail-left: 48%; --trail-top: 93%; }

    .transition-wash {
      position: absolute;
      inset: 0;
      z-index: 7;
      opacity: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at var(--wash-x, 50%) var(--wash-y, 50%), rgba(255, 214, 142, 0.72), transparent 18%),
        rgba(10, 4, 2, 0.76);
      transition: opacity 420ms ease;
    }

    .transition-wash.is-visible { opacity: 1; }

    .entry-stage::after,
    .entry-item::after,
    .entry-item__art::before {
      display: none !important;
    }

    @media (max-width: 900px) {
      body { overflow-y: auto; }
      .entry-stage { position: relative; min-height: 100vh; }
      .entry-ui {
        position: relative;
        z-index: 6;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 46px 16px;
        width: min(92vw, 620px);
        margin: 42vh auto 80px;
        padding: 0 10px;
      }
      .entry-item,
      .entry-ui.is-exiting .entry-item.is-selected {
        position: relative;
        left: auto;
        top: auto;
        width: 100%;
        transform: none;
      }
      .entry-item__label {
        color: rgba(255, 232, 196, 0.92);
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.46);
      }
    }

    @media (max-width: 520px) {
      .entry-ui {
        grid-template-columns: 1fr;
        width: min(74vw, 320px);
        gap: 54px;
      }
    }
  </style>
</head>
<body>
  <main class="entry-stage" aria-label="KYUKAO portfolio home">
    <div class="static-bg" aria-hidden="true"></div>
    <div class="grade" aria-hidden="true"></div>
    <a class="home-mark" href="index.html" aria-label="Replay opening">KYUKAO</a>

    <nav class="entry-ui" id="entryUi" aria-label="Portfolio sections">
      <a class="entry-item" href="resume.html" style="--x: 12.7%; --y: 58.4%; --w: 12.4%; --ratio: 697 / 929;" data-target="resume">
        <span class="entry-item__art">
          <span class="entry-item__preview"><img src="assets/entry/previews/preview-resume.webp" alt="" /></span>
          <img class="entry-item__frame" src="assets/entry/frames/resume-frame.png" alt="" />
        </span>
        <span class="entry-item__label">Resume</span>
      </a>

      <a class="entry-item" href="portfolio.html" style="--x: 30.0%; --y: 58.2%; --w: 12.4%; --ratio: 699 / 926;" data-target="portfolio">
        <span class="entry-item__art">
          <span class="entry-item__preview"><img src="assets/entry/previews/preview-portfolio.webp" alt="" /></span>
          <img class="entry-item__frame" src="assets/entry/frames/portfolio-frame.png" alt="" />
        </span>
        <span class="entry-item__label">Portfolio</span>
      </a>

      <a class="entry-item" href="about.html" style="--x: 68.0%; --y: 58.2%; --w: 12.3%; --ratio: 693 / 927;" data-target="about">
        <span class="entry-item__art">
          <span class="entry-item__preview"><img src="assets/entry/previews/preview-about.webp" alt="" /></span>
          <img class="entry-item__frame" src="assets/entry/frames/about-frame.png" alt="" />
        </span>
        <span class="entry-item__label">About</span>
      </a>

      <a class="entry-item" href="contact.html" style="--x: 85.0%; --y: 58.2%; --w: 12.4%; --ratio: 698 / 929;" data-target="contact">
        <span class="entry-item__art">
          <span class="entry-item__preview"><img src="assets/entry/previews/preview-contact.webp" alt="" /></span>
          <img class="entry-item__frame" src="assets/entry/frames/contact-frame.png" alt="" />
        </span>
        <span class="entry-item__label">Contact</span>
      </a>
    </nav>

    <svg class="entry-flow" viewBox="0 0 100 56.25" preserveAspectRatio="none" aria-hidden="true">
      <path class="flow-glow" data-flow="resume" d="M 12.7 34.8 C 13.5 42.2, 25.2 43.8, 36.8 40.4 C 43.2 38.5, 46.8 35.6, 50 33.8" />
      <path class="flow-core" data-flow="resume" d="M 12.7 34.8 C 13.5 42.2, 25.2 43.8, 36.8 40.4 C 43.2 38.5, 46.8 35.6, 50 33.8" />
      <path class="flow-glow" data-flow="portfolio" d="M 30 34.8 C 29.6 40.3, 34.4 42.8, 40.8 40.2 C 45.2 38.4, 47.3 35.7, 50 33.8" />
      <path class="flow-core" data-flow="portfolio" d="M 30 34.8 C 29.6 40.3, 34.4 42.8, 40.8 40.2 C 45.2 38.4, 47.3 35.7, 50 33.8" />
      <path class="flow-glow" data-flow="about" d="M 68 34.8 C 68.4 40.3, 63.6 42.8, 57.2 40.2 C 52.8 38.4, 50.7 35.7, 50 33.8" />
      <path class="flow-core" data-flow="about" d="M 68 34.8 C 68.4 40.3, 63.6 42.8, 57.2 40.2 C 52.8 38.4, 50.7 35.7, 50 33.8" />
      <path class="flow-glow" data-flow="contact" d="M 85 34.8 C 84.5 42.2, 72.8 43.8, 61.2 40.4 C 54.8 38.5, 51.2 35.6, 50 33.8" />
      <path class="flow-core" data-flow="contact" d="M 85 34.8 C 84.5 42.2, 72.8 43.8, 61.2 40.4 C 54.8 38.5, 51.2 35.6, 50 33.8" />
    </svg>

    <div class="transition-wash" id="transitionWash" aria-hidden="true"></div>
  </main>

  <script>
    const entryUi = document.getElementById('entryUi');
    const transitionWash = document.getElementById('transitionWash');
    const entryStage = document.querySelector('.entry-stage');

    document.querySelectorAll('.entry-item').forEach((item) => {
      item.addEventListener('pointerdown', () => item.classList.add('is-pressing'));
      ['pointerup', 'pointerleave', 'pointercancel'].forEach((type) => {
        item.addEventListener(type, () => item.classList.remove('is-pressing'));
      });

      item.addEventListener('click', (event) => {
        event.preventDefault();
        if (entryUi.classList.contains('is-exiting')) return;
        const href = item.getAttribute('href') || '';
        const route = item.dataset.target || '';
        const rect = item.getBoundingClientRect();
        entryStage.dataset.route = route;
        entryStage.classList.add('is-routing');
        item.classList.add('is-selected');
        entryUi.classList.add('is-exiting');
        transitionWash.style.setProperty('--wash-x', `${rect.left + rect.width / 2}px`);
        transitionWash.style.setProperty('--wash-y', `${rect.top + rect.height / 2}px`);
        window.setTimeout(() => {
          transitionWash.classList.add('is-visible');
        }, 760);
        window.setTimeout(() => {
          window.location.href = href;
        }, 1120);
      });
    });
  </script>
</body>
</html>
