<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Hanqing Li - KYUKAO</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;700&display=swap');

    :root {
      --gold: #d7a85f;
      --gold-soft: rgba(226, 176, 94, 0.62);
      --gold-dim: rgba(226, 176, 94, 0.22);
      --ink: #090504;
      --panel: rgba(21, 11, 8, 0.66);
      --paper: #f5d59d;
      --muted: rgba(245, 213, 157, 0.68);
      --shadow: rgba(8, 3, 2, 0.78);
      --font: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
      --display: "Cormorant Garamond", Georgia, serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--paper);
      font-family: var(--font);
      overflow-x: hidden;
      background: transparent;
    }

    a { color: inherit; text-decoration: none; }
    img, video { display: block; max-width: 100%; }

    .portfolio-bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -2;
      pointer-events: none;
      object-fit: cover;
      background: #070403;
    }

    .portfolio-bg-grade {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 187, 95, 0.08), transparent 30%),
        linear-gradient(180deg, rgba(7, 3, 2, 0.2), rgba(7, 3, 2, 0.36));
    }

    .portfolio-shell {
      position: relative;
      width: min(1080px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 92px 0 72px;
    }
    .intro {
      min-height: 48vh;
      display: flex;
      align-items: center;
      padding: 72px 22px 38px;
    }

    .intro__inner {
      width: min(760px, 100%);
      margin: 0 auto;
      text-align: center;
    }

    .intro__eyebrow {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .intro__title {
      margin: 0;
      color: var(--paper);
      font-family: var(--display);
      font-size: clamp(2.7rem, 6vw, 5.6rem);
      line-height: 0.94;
      letter-spacing: 0;
      text-shadow: 0 0 28px rgba(226, 176, 94, 0.24);
    }

    .intro__copy {
      width: min(610px, 100%);
      margin: 22px auto 0;
      color: var(--muted);
      font-size: clamp(0.9rem, 1.5vw, 1.05rem);
      line-height: 1.8;
    }

    .top-nav {
      position: fixed;
      top: 22px;
      left: 32px;
      right: 32px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(245, 213, 157, 0.76);
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .top-nav a,
    .top-nav button {
      pointer-events: auto;
    }

    .nav-logo {
      font-family: var(--display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--paper);
      text-shadow: 0 0 18px rgba(226, 176, 94, 0.32);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 22px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .nav-links a {
      opacity: 0.72;
      transition: opacity 180ms ease, color 180ms ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      opacity: 1;
      color: var(--gold);
    }

    .nav-toggle,
    .lang-toggle {
      display: none;
    }

    .works-heading {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 22px;
      width: min(720px, 76vw);
      margin: 0 auto 34px;
      color: var(--gold);
    }

    .works-heading::before,
    .works-heading::after {
      content: "";
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-soft));
    }

    .works-heading::after {
      background: linear-gradient(90deg, var(--gold-soft), transparent);
    }

    .works-heading span {
      position: relative;
      font-family: var(--display);
      font-size: clamp(2rem, 3vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-shadow: 0 0 22px rgba(226, 176, 94, 0.28);
    }

    .works-heading span::before,
    .works-heading span::after {
      content: "✿";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold-soft);
      font-size: 1.2rem;
      letter-spacing: 0;
    }

    .works-heading span::before { right: calc(100% + 28px); }
    .works-heading span::after { left: calc(100% + 18px); }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: -12px auto 34px;
      padding: 0 18px;
    }

    .filter-btn {
      min-width: 76px;
      padding: 9px 14px;
      border: 1px solid rgba(226, 176, 94, 0.4);
      background: rgba(21, 11, 8, 0.48);
      color: rgba(245, 213, 157, 0.72);
      font-family: var(--font);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 180ms ease, border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      color: var(--paper);
      border-color: var(--gold-soft);
      background: rgba(72, 35, 15, 0.56);
      box-shadow: 0 0 18px rgba(226, 176, 94, 0.14);
    }

    .portfolio-frame {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 48px 34px;
      padding: 0 22px;
    }

    .portfolio-grid {
      display: contents;
    }

    .no-results {
      display: none !important;
    }

    .works-section {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(70px, 1fr) auto minmax(70px, 1fr);
      align-items: center;
      gap: 18px;
      width: min(640px, 74vw);
      margin: 10px auto -10px;
      color: var(--gold);
    }

    .works-section::before,
    .works-section::after {
      content: "";
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-soft));
    }

    .works-section::after {
      background: linear-gradient(90deg, var(--gold-soft), transparent);
    }

    .works-section-title {
      margin: 0;
      font-family: var(--display);
      font-size: clamp(1.45rem, 2.1vw, 2.1rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--gold);
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(226, 176, 94, 0.22);
    }

    .works-section.is-filter-hidden {
      display: none !important;
    }

    .work-card {
      position: relative;
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--gold-soft);
      box-shadow:
        0 22px 38px var(--shadow),
        inset 0 0 0 1px rgba(255, 233, 178, 0.08);
      overflow: visible;
      isolation: isolate;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 700ms ease, transform 700ms ease, filter 360ms ease;
    }

    .work-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .work-card::before,
    .work-card::after {
      content: "";
      position: absolute;
      inset: -9px;
      z-index: 2;
      pointer-events: none;
      border: 1px solid var(--gold-dim);
      clip-path: polygon(0 7%, 7% 0, 93% 0, 100% 7%, 100% 93%, 93% 100%, 7% 100%, 0 93%);
    }

    .work-card::after {
      inset: -16px;
      border-color: rgba(226, 176, 94, 0.16);
      filter: blur(0.2px);
    }

    .work-thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: rgba(12, 7, 6, 0.78);
      clip-path: polygon(0 7%, 5% 0, 95% 0, 100% 7%, 100% 93%, 95% 100%, 5% 100%, 0 93%);
    }

    .work-thumb-bg,
    .work-thumb-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background-size: cover;
      background-position: center;
      filter: saturate(0.96) contrast(1.03) brightness(0.82);
      transform: scale(1.01);
      transition: transform 700ms ease, filter 700ms ease;
    }

    .work-thumb-bg {
      display: grid;
      place-items: center;
      color: var(--muted);
      min-height: 100%;
      padding: 24px;
      text-align: center;
    }

    .work-card:hover {
      filter: drop-shadow(0 0 20px rgba(226, 176, 94, 0.18));
    }

    .work-card:hover .work-thumb-bg,
    .work-card:hover .work-thumb-video {
      transform: scale(1.07);
      filter: saturate(1.08) contrast(1.06) brightness(0.94);
    }

    .work-info {
      position: relative;
      display: block;
      min-height: 66px;
      padding: 14px 22px 12px;
      border-top: 1px solid var(--gold-dim);
      background: linear-gradient(90deg, rgba(27, 11, 7, 0.76), rgba(64, 31, 15, 0.45), rgba(27, 11, 7, 0.76));
      text-align: center;
    }

    .work-title {
      margin: 0;
      font-family: var(--display);
      font-size: clamp(1.45rem, 2.3vw, 2rem);
      font-weight: 600;
      letter-spacing: 0.13em;
      color: var(--paper);
      line-height: 1.1;
      text-shadow: 0 0 18px rgba(226, 176, 94, 0.26);
    }

    .work-desc,
    .work-tags,
    .work-links {
      display: none;
    }

    .video-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 4;
      padding: 4px 9px;
      border: 1px solid rgba(245, 213, 157, 0.35);
      color: rgba(255, 238, 203, 0.82);
      background: rgba(12, 5, 3, 0.52);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
    }

    .play-icon {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: grid;
      place-items: center;
      opacity: 0;
      background: radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.28), transparent 34%);
      transition: opacity 240ms ease;
    }

    .play-icon svg {
      width: 50px;
      height: 50px;
      fill: rgba(255, 238, 203, 0.9);
      filter: drop-shadow(0 0 16px rgba(226, 176, 94, 0.42));
    }

    .work-card:hover .play-icon {
      opacity: 1;
    }

    .work-card.is-filter-hidden {
      display: none !important;
    }

    footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 54px 24px 34px;
      color: rgba(245, 213, 157, 0.52);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .footer-logo,
    .footer-links {
      display: none;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 900px) {
      body {
        overflow-y: auto;
      }

      .top-nav {
        left: 18px;
        right: 18px;
      }

      .nav-links {
        gap: 14px;
        font-size: 0.64rem;
      }

      .portfolio-shell {
        width: min(92vw, 560px);
        padding-top: 86px;
      }

      .portfolio-frame {
        grid-template-columns: 1fr;
        gap: 42px;
        padding: 0;
      }

      .works-heading {
        width: 100%;
      }

      .filter-bar {
        margin-bottom: 28px;
      }

      .works-section {
        width: 100%;
      }
    }

    @media (max-width: 560px) {
      .nav-links {
        display: none;
      }

      .portfolio-shell {
        padding-top: 76px;
      }
      .intro {
        min-height: 44vh;
        padding: 56px 4px 26px;
      }

      .works-heading {
        gap: 14px;
      }

      .works-heading span {
        font-size: 1.8rem;
        letter-spacing: 0.2em;
      }

      footer {
        line-height: 1.6;
        text-align: center;
      }
    }
  </style>

<body class="portfolio-theater scene-page">
  <div class="portfolio-bg-grade" aria-hidden="true"></div>

  <nav class="top-nav">
    <a href="#introTitle" class="nav-logo">KYUKAO</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="portfolio.html" class="active" data-i18n="nav.portfolio">Portfolio</a></li>
      <li><a href="resume.html" data-i18n="nav.resume">Resume</a></li>
      <li><a href="contact.html" data-i18n="nav.contact">Contact</a></li>
    </ul>
    <div class="nav-toggle" id="navToggle"><span></span><span></span><span></span></div>
  </nav>

  <main class="portfolio-shell">
    <section class="intro" aria-labelledby="introTitle">
      <div class="intro__inner">
        <p class="intro__eyebrow" data-i18n="portfolio.intro.role">Technical Artist</p>
        <h1 class="intro__title" id="introTitle" data-i18n="portfolio.intro.name">Hanqing Li</h1>
        <p class="intro__copy" data-i18n="portfolio.intro.copy">Shaders / Tools / Animation / PCG</p>
      </div>
    </section>

    <header class="works-heading" aria-label="Works">
      <span data-i18n="portfolio.works">Works</span>
    </header>

    <div class="filter-bar" aria-label="Portfolio categories">
      <button type="button" class="filter-btn active" data-filter="all" data-i18n="filter.all">All</button>
      <button type="button" class="filter-btn" data-filter="shader" data-i18n="filter.shader">Shader</button>
      <button type="button" class="filter-btn" data-filter="pcg" data-i18n="filter.pcg">PCG</button>
      <button type="button" class="filter-btn" data-filter="render" data-i18n="filter.render">Render</button>
      <button type="button" class="filter-btn" data-filter="tool" data-i18n="filter.tool">Tools</button>
      <button type="button" class="filter-btn" data-filter="code" data-i18n="filter.code">Code</button>
    </div>

    <section class="portfolio-frame" aria-label="Portfolio works">
      <div class="portfolio-grid" id="workGridProject">
        <div class="no-results" id="noResultsProject" data-i18n="portfolio.empty.project">暂无完整项目作品</div>
      </div>
      <div class="portfolio-grid" id="workGridTool">
        <div class="no-results" id="noResultsTool" data-i18n="portfolio.empty.tool">暂无工具作品</div>
      </div>
      <div class="portfolio-grid" id="workGridArt">
        <div class="no-results" id="noResultsArt" data-i18n="portfolio.empty.art">暂无独立作品</div>
      </div>
    </section>
  </main>

  <footer>
    <span class="footer-logo">KYUKAO</span>
    <div class="footer-links">
      <a href="portfolio.html" data-i18n="footer.portfolio">作品集</a>
      <a href="resume.html" data-i18n="footer.resume">简历</a>
      <a href="contact.html" data-i18n="footer.contact">联系</a>
    </div>
    <span data-i18n="footer.copy">© 2026 Hanqing Li - All rights reserved</span>
  </footer>

  <script src="config.js?v=20260528d"></script>
  <script src="js/typography.js?v=20260528d"></script>

  <script>
    var revealObserver = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    function refinePortfolioTheater() {
      var cards = Array.from(document.querySelectorAll('#workGridProject .work-card, #workGridTool .work-card, #workGridArt .work-card'));
      cards.forEach(function (card, index) {
        card.style.transitionDelay = Math.min(index, 3) * 90 + 'ms';
        card.classList.toggle('is-portfolio-picked', index < 4);
        card.classList.toggle('is-portfolio-extra', index >= 4);
        var video = card.querySelector('.work-thumb-video');
        if (video && !video.dataset.hoverBound) {
          video.pause();
          video.removeAttribute('autoplay');
          video.dataset.hoverBound = 'true';
          card.addEventListener('mouseenter', function () {
            video.play().catch(function () {});
          });
          card.addEventListener('mouseleave', function () {
            video.pause();
          });
        }
      });
      applyPortfolioFilter();
    }

    function applyPortfolioFilter() {
      var active = document.querySelector('.filter-btn.active');
      var category = active ? active.dataset.filter : 'all';
      document.querySelectorAll('#workGridProject .work-card, #workGridTool .work-card, #workGridArt .work-card').forEach(function (card) {
        var visible = category === 'all' || card.dataset.category === category;
        card.classList.toggle('is-filter-hidden', !visible);
      });
    }

    document.querySelectorAll('.filter-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.filter-btn').forEach(function (item) {
          item.classList.toggle('active', item === btn);
        });
        applyPortfolioFilter();
      });
    });

    var portfolioGridObserver = new MutationObserver(refinePortfolioTheater);
    ['workGridProject', 'workGridTool', 'workGridArt'].forEach(function (id) {
      var grid = document.getElementById(id);
      if (grid) portfolioGridObserver.observe(grid, { childList: true });
    });

    function holdPortfolioBackground() {
      var bg = document.getElementById('portfolioBg');
      if (!bg) return;
      var seekToEnd = function () {
        if (!Number.isFinite(bg.duration) || bg.duration <= 0) return;
        bg.currentTime = Math.max(0, bg.duration - 0.08);
        bg.pause();
      };
      if (Number.isFinite(bg.duration) && bg.duration > 0) {
        seekToEnd();
      } else {
        bg.addEventListener('loadedmetadata', seekToEnd, { once: true });
      }
    }

    window.addEventListener('load', function () {
      try {
        holdPortfolioBackground();
        var hasCard = document.querySelector('#workGridProject .work-card, #workGridTool .work-card, #workGridArt .work-card');
        if (!hasCard && typeof renderPortfolioCards === 'function') {
          var lang = 'en';
          try { lang = localStorage.getItem('lang') || 'en'; } catch (e) {}
          renderPortfolioCards(lang);
        }
        refinePortfolioTheater();
      } catch (e) {
        console.error('[portfolio] render failed:', e);
      }
    });

    var portfolioRefineTimer = window.setInterval(function () {
      if (document.querySelector('#workGridProject .work-card, #workGridTool .work-card, #workGridArt .work-card')) {
        refinePortfolioTheater();
        window.clearInterval(portfolioRefineTimer);
      }
    }, 30);
  </script>
</body>
